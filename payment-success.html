<!DOCTYPE html>
<html lang="en">
<head>
<script src="/ga.js"></script>
<meta charset="UTF-8">
<!-- ============ SCISPARK v2 LOGO + SOCIAL ============ -->
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png?v=2">
<link rel="shortcut icon" href="/assets/favicon.ico?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png?v=2">
<link rel="apple-touch-icon" sizes="167x167" href="/assets/apple-touch-icon-167.png?v=2">
<link rel="apple-touch-icon" sizes="152x152" href="/assets/apple-touch-icon-152.png?v=2">
<link rel="apple-touch-icon" sizes="120x120" href="/assets/apple-touch-icon-120.png?v=2">
<link rel="manifest" href="/site.webmanifest?v=2">
<meta name="theme-color" content="#EA580C">
<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="SciSpark">
<meta property="og:image" content="https://scisparklab.com/assets/og-image.png?v=2">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="SciSpark — Start with the right assessment. Continue on the right path.">
<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://scisparklab.com/assets/twitter-card.png?v=2">
<meta name="twitter:image:alt" content="SciSpark — Start with the right assessment. Continue on the right path.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SciSpark — Payment Successful</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300..700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f5efe5; --orange:#e8521a; --dark:#1a1917; --text:#2d2926; --muted:#9a8e84; --border:#e2d9ce; --green:#2E7D5B; --green-bg:#d9eed9; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  nav { background:var(--dark); height:60px; display:flex; align-items:center; padding:0 24px; }
  .nav-logo { color:#fff; font-family:'EB Garamond',serif; font-size:1.3rem; font-weight:500; text-decoration:none; }
  .page { max-width:480px; margin:0 auto; padding:60px 20px; text-align:center; }
  .check { width:72px; height:72px; background:var(--green-bg); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 28px; font-size:2rem; }
  h1 { font-family:'EB Garamond',serif; font-size:2.2rem; font-weight:500; margin-bottom:12px; }
  .subtitle { color:var(--muted); font-size:0.95rem; line-height:1.6; margin-bottom:36px; }
  .card { background:#fff; border:1px solid var(--border); border-radius:20px; padding:24px; margin-bottom:24px; text-align:left; }
  .info-row { display:flex; justify-content:space-between; font-size:0.9rem; padding:8px 0; border-bottom:1px solid var(--border); }
  .info-row:last-child { border-bottom:none; }
  .info-row span:first-child { color:var(--muted); }
  .info-row span:last-child { font-weight:600; }
  .btn { display:inline-block; padding:14px 32px; background:var(--orange); color:#fff; border-radius:100px; font-weight:600; text-decoration:none; font-size:0.95rem; }
  .btn:hover { background:#d44717; }
</style>
</head>
<body>
<nav><a href="/" class="nav-logo">SciSpark</a></nav>
<div class="page">
  <div class="check">✓</div>
  <h1>Payment successful!</h1>
  <p class="subtitle">Your SciSpark access is now active. Your child can start learning today.</p>

  <div class="card">
    <div class="info-row"><span>Status</span><span style="color:var(--green)">Active</span></div>
    <div class="info-row"><span>Plan</span><span id="plan-display">—</span></div>
    <div class="info-row"><span>Valid until</span><span id="expiry-display">—</span></div>
  </div>

  <a href="/dashboard-parent.html" class="btn">Go to Dashboard →</a>
</div>

<script>
  function fmtDate(d) {
    return d.toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" });
  }

  // Plan comes through the success URL (?plan=monthly|annual), set by create-checkout.
  const params = new URLSearchParams(window.location.search);
  const isAnnual = (params.get("plan") || "monthly").toLowerCase() === "annual";

  // Plan label — real type, bilingual (English-primary). No more generic "SciSpark Plan".
  document.getElementById("plan-display").textContent = isAnnual ? "Annual / 年付" : "Monthly / 月付";

  // Valid until — derive from the real plan: monthly = +1 month, annual = +1 year.
  // No more hardcoded +1 year.
  const expiry = new Date();
  if (isAnnual) expiry.setFullYear(expiry.getFullYear() + 1);
  else          expiry.setMonth(expiry.getMonth() + 1);
  document.getElementById("expiry-display").textContent = fmtDate(expiry);
</script>
</body>
</html>
