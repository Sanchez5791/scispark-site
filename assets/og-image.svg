<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F5F0E6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#EA580C" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#glow)"/>

  <!-- Top eyebrow -->
  <text x="80" y="120"
        font-family="'Geist Mono', ui-monospace, monospace"
        font-size="16"
        font-weight="600"
        letter-spacing="2.2"
        fill="#EA580C">CAMBRIDGE  0893  ·  YEAR  7 – 9  SCIENCE</text>

  <!-- Big serif manifesto -->
  <text x="80" y="220"
        font-family="'Fraunces', Georgia, serif"
        font-size="62"
        font-weight="400"
        letter-spacing="-1.4"
        fill="#1A1A1A">Start with the right assessment.</text>
  <text x="80" y="295"
        font-family="'Fraunces', Georgia, serif"
        font-size="62"
        font-weight="400"
        font-style="italic"
        letter-spacing="-1.4"
        fill="#EA580C">Continue on the right path.</text>

  <!-- Sub copy (EN-only — CJK doesn't render server-side without CJK font installed) -->
  <text x="80" y="365"
        font-family="'Geist', sans-serif"
        font-size="22"
        font-weight="400"
        fill="#5C5852">An AI-managed science learning system. Assessment-first. Bilingual.</text>

  <!-- Logo lockup bottom-left -->
  <g transform="translate(80, 470)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#EA580C"/>
    <g transform="translate(17, 16) scale(2)">
      <path d="M14 2 L4 14 L11 14 L9 22 L19 9 L12 9 L14 2 Z" fill="#FFFFFF"/>
    </g>
    <text x="100" y="35"
          font-family="'Fraunces', Georgia, serif"
          font-size="44"
          font-weight="600"
          letter-spacing="-0.8"
          fill="#1A1A1A">Sci<tspan fill="#EA580C">Spark</tspan></text>
    <text x="100" y="65"
          font-family="'Geist Mono', ui-monospace, monospace"
          font-size="13"
          font-weight="500"
          letter-spacing="1.6"
          fill="#9C9890">AN  IG  SPARK  CENTRE  PRODUCT</text>
  </g>

  <!-- URL bottom-right -->
  <text x="1120" y="540"
        font-family="'Geist Mono', ui-monospace, monospace"
        font-size="16"
        font-weight="500"
        letter-spacing="1.2"
        fill="#9C9890"
        text-anchor="end">scisparklab.com</text>
</svg>
