<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260" role="img" aria-label="Simple electric circuit">
  <rect x="0" y="0" width="400" height="260" fill="#fbfdff"/>
  <!-- wires (rectangle loop) -->
  <g stroke="#2b3a4a" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M60 40 H180"/>
    <path d="M220 40 H340"/>
    <path d="M340 40 V120"/>
    <path d="M340 140 V220"/>
    <path d="M340 220 H214"/>
    <path d="M186 220 H60"/>
    <path d="M60 220 V40"/>
  </g>
  <!-- cell / battery (top centre) -->
  <g stroke="#c2410c" stroke-width="4" stroke-linecap="round">
    <line x1="190" y1="26" x2="190" y2="54"/>
    <line x1="206" y1="34" x2="206" y2="46"/>
  </g>
  <text x="200" y="74" text-anchor="middle" font-family="system-ui" font-size="13" fill="#94a3b8">cell</text>
  <!-- bulb (right centre) -->
  <g transform="translate(340,130)">
    <circle r="20" fill="#fff8e1" stroke="#b45309" stroke-width="4"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#b45309" stroke-width="3"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#b45309" stroke-width="3"/>
  </g>
  <!-- switch (bottom centre) -->
  <g stroke="#0f766e" stroke-width="4" stroke-linecap="round">
    <circle cx="186" cy="220" r="4" fill="#0f766e"/>
    <circle cx="214" cy="220" r="4" fill="#0f766e"/>
    <line x1="186" y1="220" x2="210" y2="206"/>
  </g>
</svg>
