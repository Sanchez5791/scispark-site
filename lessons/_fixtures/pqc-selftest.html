     so toggleAns + submitAnswer run the capture path. Safe to delete anytime. -->
<link rel="stylesheet" href="/lesson-shell-v4.css">

  window.SB_URL = 'https://fiffuaoibxeggwxcfvfh.supabase.co';

<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 0 auto; padding: 24px; }
  .question-block { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin: 16px 0; }
  .q-number { font-weight: 700; } .q-marks { color: #888; font-size: 13px; }
  textarea.short-input { width: 100%; min-height: 64px; padding: 8px; }
  .answer-reveal { display: none; margin-top: 10px; padding: 10px; background: #eef7ef; border-radius: 8px; }
  .answer-reveal.show { display: block; }
  .option { display: block; width: 100%; text-align: left; padding: 10px; margin: 6px 0; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; }
  .btn { padding: 8px 14px; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
  #xp-toast { position: fixed; top: 12px; right: 12px; }
</style>
</head>
<body data-lesson="0" data-user-level="1">

<div id="xp-toast"></div>

<h1>Per-question capture · self-test fixture</h1>
<p>Real v4 engine (<code>/lesson-shell-v4.js</code>). Drives <code>toggleAns</code> + <code>submitAnswer</code>.</p>

<div class="screen active" data-screen="test">

  <!-- ① free-text question → toggleAns ("Check answer") path -->
  <div class="question-block q-block" id="Q01-block" data-question="Q01">
    <div class="question-header">
      <span class="q-number">Q01</span> · <span class="q-marks">1 mark</span>
    </div>
    <p class="question-text">Name one object in a room and the energy it has.</p>
    <textarea class="short-input" id="Q01-input" placeholder="Your answer..."></textarea>
    <div class="answer-reveal" id="Q01-ans">
      <strong>✓ Marking scheme:</strong> e.g. "the battery has chemical energy".
    </div>
    <button class="btn" onclick="toggleAns('Q01-ans')">Check answer</button>
  </div>

  <!-- ② MCQ question → submitAnswer path -->
  <div class="question-block q-block" id="Q02-block" data-question="Q02">
    <div class="question-header">
      <span class="q-number">Q02</span> · <span class="q-marks">1 mark</span>
    </div>
    <p class="question-text">A moving fan mainly has which energy?</p>
    <button class="option mcq-option" onclick="submitAnswer(this, true, {questionId:'Q02', screen:'test'})">Kinetic energy</button>
    <button class="option mcq-option" onclick="submitAnswer(this, false, {questionId:'Q02', screen:'test', correctEl:this.previousElementSibling})">Chemical energy</button>
  </div>

</div>

<script src="/lesson-shell-v4.js"></script>
</body>
</html>
