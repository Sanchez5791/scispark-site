<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>预览一键登录 · Preview quick-login</title>
<!--
  ⛔ PREVIEW ONLY — DO NOT SHIP TO PRODUCTION. ⛔
  One-tap login for the 求救按钮 preview so Sanchez can test on his phone
  without typing credentials. Hard-gated to *.vercel.app / localhost: on any
  other host (e.g. scisparklab.com) it refuses and does nothing. Uses throwaway
  TEST accounts only. DELETE THIS FILE before merging to main.
-->
<style>
  :root{--bg:#FBF8F4;--card:#FFFCF7;--ink:#0F172A;--ink3:#6b6358;--line:#E8E2D8;--accent:#EA580C;--bad:#B91C1C}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:'Geist','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--ink);
       display:flex;align-items:center;justify-content:center;padding:20px;line-height:1.5}
  .card{max-width:380px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;
        box-shadow:0 8px 24px rgba(15,23,42,.08);padding:28px 24px;text-align:center}
  h1{font-size:18px;margin:0 0 6px} p{font-size:13.5px;color:var(--ink3);margin:0 0 16px}
  .who{font-weight:800;color:var(--accent)}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;
        margin:8px auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn{display:inline-block;font:inherit;font-weight:700;font-size:14px;cursor:pointer;border:none;
       border-radius:999px;padding:11px 20px;background:var(--accent);color:#fff;text-decoration:none}
  .err{color:var(--bad);font-size:13px;font-weight:600;margin-top:10px}
  .links{margin-top:16px;font-size:12.5px}
  .links a{color:var(--accent);display:block;margin:4px 0}
  .badge{display:inline-block;background:#FEF3C7;color:#B45309;font-size:11px;font-weight:800;
         padding:3px 9px;border-radius:7px;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="badge">⛔ 预览专用 · PREVIEW ONLY</div>
  <h1>一键登录测试 · Quick login</h1>
  <div id="stage"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
  'use strict';
  var stage = document.getElementById('stage');

  // ── HARD GATE: preview hosts only. Never runs on production. ──
  var host = location.hostname;
  var isPreview = /\.vercel\.app$/i.test(host) || host === 'localhost' || host === '127.0.0.1';
  if (!isPreview) {
    stage.innerHTML = '<p class="err">此页仅供预览环境使用,已在正式站停用。<br>Preview only — disabled on production.</p>';
    return;
  }

  var SUPABASE_URL = 'https://fiffuaoibxeggwxcfvfh.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_OOrhuk8oqIbNLg3Wxo6fzQ_7z4sloBJ';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // throwaway TEST accounts (preview only)
  var ACCOUNTS = {
    student: { email:'test-progress@scisparklab.com', password:'SciSpark-Test-2026',  label:'测试学生 Student',
               next:'/lessons/y7/u1/l01?s=test' },
    teacher: { email:'test-teacher@scisparklab.com',  password:'SciSpark-Teacher-2026', label:'测试老师 Teacher',
               next:'/review-console' }
  };

  var params = new URLSearchParams(location.search);
  var as = (params.get('as') || 'student').toLowerCase();
  var acct = ACCOUNTS[as] || ACCOUNTS.student;
  var next = params.get('next') || acct.next;

  function showMenu(msg){
    stage.innerHTML =
      (msg ? '<p class="err">'+msg+'</p>' : '<p>选一个身份,点一下就登录进去测。</p>') +
      '<div class="links">' +
        '<a class="btn" href="?as=student">▶ 以测试学生登录 → 课页(看求救按钮)</a>' +
        '<a href="?as=teacher" style="margin-top:10px">以测试老师登录 → 复核后台</a>' +
      '</div>';
  }

  async function go(){
    stage.innerHTML = '<div class="spin"></div><p>正在以 <span class="who">'+acct.label+'</span> 登录,马上带你进去…</p>';
    try {
      // sign out any stale session first so we land as the requested account
      try { await sb.auth.signOut(); } catch(e){}
      var r = await sb.auth.signInWithPassword({ email:acct.email, password:acct.password });
      if (r.error) { showMenu('登录失败:'+r.error.message); return; }
      // session persisted to localStorage → the lesson/console will read it
      location.replace(next);
    } catch(e){
      showMenu('登录出错:'+(e&&e.message||e));
    }
  }

  if (params.get('as')) go(); else showMenu('');
})();
</script>
</body>
</html>
