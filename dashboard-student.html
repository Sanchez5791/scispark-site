<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SciSpark — Student Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5efe5;--bg-card:#fff;--bg-subtle:#f0e9df;
  --orange:#e8521a;--orange-h:#d44717;--orange-l:#fdf2ed;--orange-m:#f9d9cc;
  --dark:#1a1917;
  --text:#2d2926;--muted:#9a8e84;--light:#c5bbb4;--border:#e2d9ce;
  --green:#2E7D5B;--green-bg:#d9eed9;
  --serif:'EB Garamond',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none}

.nav{position:sticky;top:0;z-index:100;background:var(--dark);box-shadow:0 2px 16px rgba(0,0,0,.3)}
.nav-bar{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:32px;height:32px;flex-shrink:0}
.brand-text{display:flex;flex-direction:column;line-height:1.15}
.brand-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em}
.brand-name span{color:var(--orange)}
.brand-sub{font-size:9px;color:var(--light);letter-spacing:.07em;text-transform:uppercase}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-user{display:flex;align-items:center;gap:9px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--orange);display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.nav-name{font-size:13px;color:rgba(255,255,255,.85);font-weight:500;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-signout{font-size:12px;color:rgba(255,255,255,.5);padding:5px 12px;border:1px solid rgba(255,255,255,.18);border-radius:100px;cursor:pointer;transition:.15s}
.nav-signout:hover{color:#fff;border-color:rgba(255,255,255,.45)}

.wrap{max-width:680px;margin:0 auto;padding:60px 24px 80px}
.hero{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);background:var(--orange-l);border:1px solid var(--orange-m);padding:4px 10px;border-radius:4px;margin-bottom:18px}
.h1{font-family:var(--serif);font-size:34px;font-weight:500;color:var(--dark);letter-spacing:-.02em;line-height:1.15;margin-bottom:10px}
.sub{font-size:15px;color:var(--muted);margin-bottom:32px;line-height:1.55}
.btn-primary{display:inline-flex;align-items:center;gap:8px;font-size:16px;font-weight:600;color:#fff;background:var(--orange);padding:14px 32px;border-radius:100px;transition:.15s;border:0}
.btn-primary:hover:not(:disabled){background:var(--orange-h)}
.btn-primary:disabled{cursor:default;opacity:.95}
.btn-primary.done{background:var(--green)}
.btn-primary.done:hover{background:var(--green)}
.status-msg{margin-top:18px;font-size:13px;color:var(--muted)}
.status-msg.ok{color:var(--green);font-weight:500}
.error{padding:14px 18px;background:#fff3f0;border:1px solid var(--orange-m);border-radius:10px;color:#a83711;font-size:13px;text-align:left;margin-top:8px}
.loading-block{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}
.footer-note{text-align:center;margin-top:24px;font-size:12px;color:var(--muted)}
.help-note{margin-top:28px;padding-top:24px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);line-height:1.55}

@media(max-width:560px){
  .wrap{padding:30px 16px 40px}
  .hero{padding:32px 22px}
  .h1{font-size:26px}
  .sub{font-size:14px}
  .btn-primary{font-size:15px;padding:13px 26px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-bar">
    <div class="brand">
      <svg class="logo-mark" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="50" rx="30" ry="11" stroke="#EA580C" stroke-width="1.8" opacity="0.22" transform="rotate(-20 50 50)"/>
        <path d="M57 15 L43 46 L58 42 L40 85" stroke="#EA580C" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="40" cy="85" r="3.5" fill="#EA580C" opacity="0.7"/>
        <circle cx="57" cy="15" r="2.5" fill="#EA580C" opacity="0.5"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">Sci<span>Spark</span></span>
        <span class="brand-sub">Year 7&ndash;9 Science &middot; Cambridge 0893</span>
      </div>
    </div>
    <div class="nav-right">
      <div class="nav-user">
        <div class="avatar" id="navAvatar">&middot;&middot;</div>
        <span class="nav-name" id="navName">Loading&hellip;</span>
      </div>
      <a href="#" class="nav-signout" id="signOutBtn">Sign Out</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="hero">
    <div class="loading-block" id="loading">Loading your dashboard&hellip;</div>
    <div id="content" style="display:none">
      <div class="eyebrow" id="yearBadge">Entry Assessment</div>
      <h1 class="h1" id="welcomeMsg">Welcome.</h1>
      <p class="sub" id="subMsg"></p>
      <button class="btn-primary" id="startBtn" disabled>&hellip;</button>
      <div class="status-msg" id="statusMsg"></div>
      <div class="help-note" id="helpNote"></div>
    </div>
    <div class="error" id="error" style="display:none"></div>
  </div>
  <div class="footer-note" id="footerNote"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://fiffuaoibxeggwxcfvfh.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_OOrhuk8oqIbNLg3Wxo6fzQ_7z4sloBJ'

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const YEAR_TO_URL = {
  Y7: '/assessment/year-7/en/assessment-y7.html',
  Y8: '/assessment/year-8/en/assessment-y8.html',
  Y9: '/assessment/year-9/en/assessment-y9.html'
}

const $ = id => document.getElementById(id)

function showError(msg){
  $('loading').style.display = 'none'
  $('content').style.display = 'none'
  const e = $('error')
  e.style.display = 'block'
  e.textContent = msg
}

function getInitials(name){
  if(!name) return '··'
  const parts = String(name).trim().split(/[\s\-_]+/).filter(Boolean)
  if(parts.length === 0) return '··'
  if(parts.length === 1) return parts[0].slice(0,2).toUpperCase()
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
}

function normalizeYear(yr){
  if(!yr) return ''
  const s = String(yr).trim().toLowerCase().replace(/[\s\-]/g,'')
  if(s === 'y7' || s === 'year7' || s === '7') return 'Y7'
  if(s === 'y8' || s === 'year8' || s === '8') return 'Y8'
  if(s === 'y9' || s === 'year9' || s === '9') return 'Y9'
  return String(yr).toUpperCase()
}

async function findChild(userId){
  // Path 1: F&F flow — children.parent_id = auth.uid() (user is own parent)
  const r1 = await supabase
    .from('children')
    .select('id, full_name, year_group')
    .eq('parent_id', userId)
    .limit(1)
    .maybeSingle()
  if(r1.data) return { child: r1.data }

  // Path 2: paid flow — student_accounts.student_user_id JOIN children
  const r2 = await supabase
    .from('student_accounts')
    .select('child_id, children!inner(id, full_name, year_group)')
    .eq('student_user_id', userId)
    .limit(1)
    .maybeSingle()
  if(r2.data && r2.data.children) return { child: r2.data.children }

  return { child: null, error: r1.error || r2.error }
}

async function findAttempt(userId, childId){
  // Schema is inconsistent: assessment_attempts.student_id may hold auth.uid OR children.id.
  // Query both with OR — whichever exists wins.
  const r = await supabase
    .from('assessment_attempts')
    .select('*')
    .or(`student_id.eq.${userId},student_id.eq.${childId}`)
    .order('created_at', { ascending: false })
    .limit(1)
    .maybeSingle()
  if(r.error){
    console.warn('findAttempt error:', r.error.message)
    return null
  }
  return r.data || null
}

function isSubmitted(att){
  if(!att) return false
  if(att.submitted_at) return true
  if(att.completed_at) return true
  if(att.status && ['submitted','completed','marked','reviewed'].includes(String(att.status).toLowerCase())) return true
  return false
}

function isInProgress(att){
  if(!att) return false
  if(isSubmitted(att)) return false
  if(att.status && ['abandoned','expired','cancelled'].includes(String(att.status).toLowerCase())) return false
  return true
}

async function init(){
  // 1. Auth
  const { data: { user }, error: authErr } = await supabase.auth.getUser()
  if(authErr || !user){
    window.location.href = '/signin.html'
    return
  }

  // 2. Child record
  const { child, error: childErr } = await findChild(user.id)
  if(!child){
    showError('Could not find your student record. Please contact your teacher.' + (childErr ? ' [' + childErr.message + ']' : ''))
    return
  }

  const name = child.full_name || 'Student'
  const yr = normalizeYear(child.year_group)
  const childId = child.id

  // 3. Identity UI
  $('navName').textContent = name
  $('navAvatar').textContent = getInitials(name)
  $('welcomeMsg').textContent = `Hi, ${name}.`
  $('yearBadge').textContent = yr ? `${yr} · Entry Assessment` : 'Entry Assessment'
  $('footerNote').textContent = `Signed in as ${user.email || ''}`
  $('helpNote').textContent = 'Need help? Contact your teacher.'

  // 4. Attempt status
  const attempt = await findAttempt(user.id, childId)
  const url = YEAR_TO_URL[yr]

  // 5. Render button state
  if(isSubmitted(attempt)){
    $('subMsg').textContent = 'Your assessment has been submitted.'
    $('startBtn').textContent = 'Submitted ✓'
    $('startBtn').classList.add('done')
    $('startBtn').disabled = true
    $('statusMsg').textContent = 'Awaiting teacher review.'
    $('statusMsg').classList.add('ok')
  } else if(!url){
    $('subMsg').textContent = `Your year group is "${child.year_group || 'not set'}". Your teacher needs to set this before you can take the assessment.`
    $('startBtn').textContent = 'Not available yet'
    $('startBtn').disabled = true
  } else if(isInProgress(attempt)){
    $('subMsg').textContent = 'You have an assessment in progress. Click below to continue.'
    $('startBtn').textContent = 'Continue Assessment →'
    $('startBtn').disabled = false
    $('startBtn').onclick = () => { window.location.href = `${url}?student_id=${encodeURIComponent(childId)}` }
  } else {
    $('subMsg').textContent = 'Click below when you are ready to start your entry assessment. It takes about 45 minutes.'
    $('startBtn').textContent = 'Start Your Assessment →'
    $('startBtn').disabled = false
    $('startBtn').onclick = () => { window.location.href = `${url}?student_id=${encodeURIComponent(childId)}` }
  }

  $('loading').style.display = 'none'
  $('content').style.display = 'block'
}

$('signOutBtn').addEventListener('click', async (e) => {
  e.preventDefault()
  await supabase.auth.signOut()
  window.location.href = '/signin.html'
})

init().catch(err => {
  console.error(err)
  showError('Unexpected error: ' + (err.message || String(err)))
})
</script>

</body>
</html>
